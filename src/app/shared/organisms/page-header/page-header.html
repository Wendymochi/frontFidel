<div class="flex items-center justify-between mb-6">

  <div>
    <h1 class="text-3xl font-bold text-slate-800">
      {{ title() }}
    </h1>

    @if (description()) {
      <p class="text-slate-500 mt-1">
        {{ description() }}
      </p>
    }
  </div>

  @if (buttonText()) {

    <button
  class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition"
  (click)="onActionClick()"
>
  {{ buttonText() }}
</button>

  }

</div>
