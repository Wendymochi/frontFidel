<p-toast />
<app-page-header
  title="Categorías"
  description="Administra las categorías de productos"
  buttonText="Nueva Categoría"
  (actionClick)="openDialog()"
/>

<div class="bg-white rounded-xl shadow-sm p-4 mb-4">
  <div class="flex gap-4 mb-4">

  <div class="relative flex-1">

    <i
      class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 z-10 text-gray-400"
    ></i>

    <input
      pInputText
      type="text"
      placeholder="Buscar categoría..."
      style="padding-left: 2.5rem"
      class="w-full"
      [value]="searchTerm()"
      (input)="searchTerm.set($any($event.target).value)"
    />

  </div>

  <p-select
    [options]="statusOptions"
    optionLabel="label"
    optionValue="value"
    [ngModel]="statusFilter()"
    (ngModelChange)="statusFilter.set($event)"
    class="w-56"
  />

</div>
  <p-table [value]="filteredCategorias()" [tableStyle]="{ 'min-width': '50rem' }">
    <ng-template pTemplate="header">
      <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Estado</th>
        <th class="text-center">Acciones</th>
      </tr>
    </ng-template>

    <ng-template pTemplate="body" let-categoria>
      <tr>
        <td>
          {{ categoria.id }}
        </td>

        <td>
          {{ categoria.nombre }}
        </td>
        <td>
          @if (categoria.estado) {
            <span class="px-3 py-1 rounded-full bg-green-100 text-green-700 text-sm"> Activo </span>
          } @else {
            <span class="px-3 py-1 rounded-full bg-red-100 text-red-700 text-sm"> Inactivo </span>
          }
        </td>

        <td>
          <div class="flex justify-center gap-2">
            <p-button
              icon="pi pi-pencil"
              severity="info"
              [rounded]="true"
              (click)="editCategoria(categoria)"
            />
            <p-button icon="pi pi-trash" severity="danger" [rounded]="true" />
          </div>
        </td>
      </tr>
    </ng-template>
  </p-table>
  <p-dialog
    [header]="dialogTitle()"
    [modal]="true"
    [visible]="showDialog()"
    [style]="{ width: '35rem' }"
    (onHide)="closeDialog()"
  >
    <app-categoria-form
      [categoria]="selectedCategoria()"
      (formSubmit)="onCategoriaSaved($event)"
      (formCancel)="closeDialog()"
    />
  </p-dialog>
</div>
